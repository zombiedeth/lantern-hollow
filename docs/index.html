html, body, #canvas {

html, body {

body {

#status {

#status-splash.show-image--false {

#status-splash.fullsize--true {

#status-splash.use-filter--false {

#status-progress, #status-notice {

#status-progress {

#status-notice {

}

#lantern-audio-debug button {
	appearance: none;

#lantern-audio-debug .tiny {

		<script>
const GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"emscriptenPoolSize":8,"ensureCrossOriginIsolationHeaders":true,"executable":"index","experimentalVK":false,"fileSizes":{"index.pck":15857676,"index.wasm":39509339},"focusCanvas":true,"gdextensionLibs":[],"godotPoolSize":4};
const GODOT_THREADS_ENABLED = false;
const engine = new Engine(GODOT_CONFIG);

// Mobile fullscreen guard: exported Godot shells can leave the canvas at
// its internal size on phones. Force the DOM canvas to match the live visual
// viewport before and during the game boot.
(function forceMobileFullscreenCanvas() {
	function resizeCanvas() {
		const canvas = document.getElementById('canvas');
		if (!canvas) return;
		const vv = window.visualViewport;
		const w = Math.ceil(vv ? vv.width : window.innerWidth);
		const h = Math.ceil(vv ? vv.height : window.innerHeight);
		document.documentElement.style.width = w + 'px';
		document.documentElement.style.height = h + 'px';
		document.body.style.width = w + 'px';
		document.body.style.height = h + 'px';
		canvas.style.width = w + 'px';
		canvas.style.height = h + 'px';
	}
	window.addEventListener('resize', resizeCanvas, { passive: true });
	window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 250), { passive: true });
	if (window.visualViewport) window.visualViewport.addEventListener('resize', resizeCanvas, { passive: true });
	resizeCanvas();
})();

// iPhone Safari fallback: Godot WebAudio can report "playing" while staying
// silent on some iPhones. Use native HTML audio for the base lofi track on web.
// This is invisible: no overlay, no button, no extra UI. First normal game tap
// starts it.
(function setupLanternNativeAudio() {
	const MUSIC_SRC = 'music_07_glowing_garden.mp3';
	const audio = new Audio(MUSIC_SRC);
	audio.id = 'lantern-native-music';
	audio.loop = true;
	audio.preload = 'auto';
	audio.volume = 0.88;
	audio.muted = false;
	audio.setAttribute('playsinline', '');
	audio.setAttribute('webkit-playsinline', '');
	let started = false;
	let attemptInFlight = false;
	const debugState = window.LanternAudioDebugState = window.LanternAudioDebugState || {};
	Object.assign(debugState, {
		build: 'audio_debug_v16_panel',
		musicSrc: MUSIC_SRC,
		lastGesture: 'none yet',
		lastUnlock: 'not attempted',
		lastUnlockError: '',
		lastBeep: 'not attempted',
		lastBeepError: '',
	});

	['touchstart', 'touchend', 'pointerdown', 'mousedown', 'click'].forEach((eventName) => {
		window.addEventListener(eventName, () => {
			debugState.lastGesture = eventName + ' @ ' + new Date().toLocaleTimeString();
		}, { capture: true, passive: true });
	});

	async function unlock(reason) {
		debugState.lastUnlock = 'attempting: ' + reason;
		debugState.lastUnlockError = '';
		if (started || attemptInFlight) {
			debugState.lastUnlock = started ? 'already started: ' + reason : 'attempt already in flight: ' + reason;
			return;
		}
		attemptInFlight = true;
		try {
			audio.muted = false;
			audio.volume = 0.88;
			if (audio.readyState === 0) audio.load();
			await audio.play();
			started = true;
			debugState.lastUnlock = 'SUCCESS: ' + reason;
			console.log('LANTERN_NATIVE_AUDIO_STARTED', reason, audio.readyState, audio.currentSrc || MUSIC_SRC);
		} catch (err) {
			attemptInFlight = false;
			debugState.lastUnlock = 'FAILED: ' + reason;
			debugState.lastUnlockError = err ? ((err.name || 'Error') + ': ' + (err.message || String(err))) : 'unknown error';
			console.warn('LANTERN_NATIVE_AUDIO_BLOCKED', reason, err && (err.name || err.message || err));
		}
	}

	window.LanternNativeAudio = { unlock, audio };
	['touchstart', 'touchend', 'pointerdown', 'mousedown', 'click'].forEach((eventName) => {
		window.addEventListener(eventName, () => unlock(eventName), { capture: true, passive: true });
	});
	document.addEventListener('visibilitychange', () => {
		if (!document.hidden && started && audio.paused) audio.play().catch(() => {});
	});
})();

// TEMPORARY iPhone audio diagnostics. Remove after the phone tells us what is
// actually failing. This panel intentionally sits above the game and includes a
// direct beep button that bypasses Godot + the music file.
(function setupLanternAudioDebugPanel() {
	function ready(fn) {
		if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', fn, { once: true });
		else fn();
	}

	ready(() => {
		const panel = document.createElement('div');
		panel.id = 'lantern-audio-debug';
		panel.innerHTML = '<strong>🔊 TEMP AUDIO DEBUG</strong>' +
			'<div><button id="lantern-debug-beep">TEST BEEP</button><button id="lantern-debug-music">TRY MUSIC</button><button id="lantern-debug-hide">HIDE</button></div>' +
			'<pre id="lantern-debug-readout">booting…</pre>' +
			'<div class="tiny">Screenshot this after tapping TEST BEEP. This panel is temporary.</div>';
		document.body.appendChild(panel);

		const readout = panel.querySelector('#lantern-debug-readout');
		const debugState = window.LanternAudioDebugState = window.LanternAudioDebugState || {};
		let beepCtx = null;

		function describeAudioElement(audio) {
			if (!audio) return 'music element: missing';
			return [
				'music.paused=' + audio.paused,
				'music.muted=' + audio.muted,
				'music.volume=' + audio.volume,
				'music.readyState=' + audio.readyState,
				'music.networkState=' + audio.networkState,
				'music.currentTime=' + audio.currentTime.toFixed(2),
				'music.duration=' + (Number.isFinite(audio.duration) ? audio.duration.toFixed(2) : String(audio.duration)),
				'music.error=' + (audio.error ? (audio.error.code + ' ' + (audio.error.message || '')) : 'none'),
				'music.src=' + (audio.currentSrc || audio.src || 'none'),
			].join('\n');
		}

		function update() {
			const audio = window.LanternNativeAudio && window.LanternNativeAudio.audio;
			const AudioContextClass = window.AudioContext || window.webkitAudioContext;
			const navBits = [
				'userAgent=' + navigator.userAgent,
				'platform=' + (navigator.platform || 'unknown'),
				'visibility=' + document.visibilityState,
				'page=' + location.href,
			];
			readout.textContent = [
				'build=' + (debugState.build || 'unknown'),
				'audioContextSupport=' + !!AudioContextClass,
				'beepCtx.state=' + (beepCtx ? beepCtx.state : 'not created'),
				'lastGesture=' + (debugState.lastGesture || 'none'),
				'lastUnlock=' + (debugState.lastUnlock || 'none'),
				'lastUnlockError=' + (debugState.lastUnlockError || 'none'),
				'lastBeep=' + (debugState.lastBeep || 'none'),
				'lastBeepError=' + (debugState.lastBeepError || 'none'),
				describeAudioElement(audio),
				navBits.join('\n'),
			].join('\n');
		}

		async function testBeep(reason) {
			const AudioContextClass = window.AudioContext || window.webkitAudioContext;
			debugState.lastBeep = 'attempting: ' + reason;
			debugState.lastBeepError = '';
			try {
				if (!AudioContextClass) throw new Error('No AudioContext/webkitAudioContext');
				beepCtx = beepCtx || new AudioContextClass();
				if (beepCtx.state !== 'running') await beepCtx.resume();
				const osc = beepCtx.createOscillator();
				const gain = beepCtx.createGain();
				osc.type = 'square';
				osc.frequency.value = 880;
				gain.gain.setValueAtTime(0.0001, beepCtx.currentTime);
				gain.gain.exponentialRampToValueAtTime(0.25, beepCtx.currentTime + 0.03);
				gain.gain.exponentialRampToValueAtTime(0.0001, beepCtx.currentTime + 0.35);
				osc.connect(gain).connect(beepCtx.destination);
				osc.start();
				osc.stop(beepCtx.currentTime + 0.38);
				debugState.lastBeep = 'SUCCESS: ' + reason + ' / ctx=' + beepCtx.state;
			} catch (err) {
				debugState.lastBeep = 'FAILED: ' + reason;
				debugState.lastBeepError = err ? ((err.name || 'Error') + ': ' + (err.message || String(err))) : 'unknown error';
			}
			update();
		}

		async function tryMusic(reason) {
			const nativeAudio = window.LanternNativeAudio;
			if (!nativeAudio) {
				debugState.lastUnlock = 'FAILED: native audio object missing';
				update();
				return;
			}
			await nativeAudio.unlock(reason);
			update();
		}

		panel.querySelector('#lantern-debug-beep').addEventListener('pointerdown', (event) => {
			event.preventDefault();
			event.stopPropagation();
			testBeep('debug pointerdown');
		}, { capture: true });
		panel.querySelector('#lantern-debug-music').addEventListener('pointerdown', (event) => {
			event.preventDefault();
			event.stopPropagation();
			tryMusic('debug music button');
		}, { capture: true });
		panel.querySelector('#lantern-debug-hide').addEventListener('pointerdown', (event) => {
			event.preventDefault();
			event.stopPropagation();
			panel.style.display = 'none';
		}, { capture: true });

		setInterval(update, 500);
		update();
		console.log('LANTERN_AUDIO_DEBUG_PANEL_READY');
	});
})();

(function () {
	const statusOverlay = document.getElementById('status');
	const statusProgress = document.getElementById('status-progress');
	const statusNotice = document.getElementById('status-notice');

	let initializing = true;
	let statusMode = '';

	function setStatusMode(mode) {
		if (statusMode === mode || !initializing) {
			return;
		}
		if (mode === 'hidden') {
			statusOverlay.remove();
			initializing = false;
			return;
		}
		statusOverlay.style.visibility = 'visible';
		statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
		statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
		statusMode = mode;
	}

	function setStatusNotice(text) {
		while (statusNotice.lastChild) {
			statusNotice.removeChild(statusNotice.lastChild);
		}
		const lines = text.split('\n');
		lines.forEach((line) => {
			statusNotice.appendChild(document.createTextNode(line));
			statusNotice.appendChild(document.createElement('br'));
		});
	}

	function displayFailureNotice(err) {
		console.error(err);
		if (err instanceof Error) {
			setStatusNotice(err.message);
		} else if (typeof err === 'string') {
			setStatusNotice(err);
		} else {
			setStatusNotice('An unknown error occurred.');
		}
		setStatusMode('notice');
		initializing = false;
	}

	const missing = Engine.getMissingFeatures({
		threads: GODOT_THREADS_ENABLED,
	});

	if (missing.length !== 0) {
		if (GODOT_CONFIG['serviceWorker'] && GODOT_CONFIG['ensureCrossOriginIsolationHeaders'] && 'serviceWorker' in navigator) {
			let serviceWorkerRegistrationPromise;
			try {
				serviceWorkerRegistrationPromise = navigator.serviceWorker.getRegistration();
			} catch (err) {
				serviceWorkerRegistrationPromise = Promise.reject(new Error('Service worker registration failed.'));
			}
			// There's a chance that installing the service worker would fix the issue
			Promise.race([
				serviceWorkerRegistrationPromise.then((registration) => {
					if (registration != null) {
						return Promise.reject(new Error('Service worker already exists.'));
					}
					return registration;
				}).then(() => engine.installServiceWorker()),
				// For some reason, `getRegistration()` can stall
				new Promise((resolve) => {
					setTimeout(() => resolve(), 2000);
				}),
			]).then(() => {
				// Reload if there was no error.
				window.location.reload();
			}).catch((err) => {
				console.error('Error while registering service worker:', err);
			});
		} else {
			// Display the message as usual
			const missingMsg = 'Error\nThe following features required to run Godot projects on the Web are missing:\n';
			displayFailureNotice(missingMsg + missing.join('\n'));
		}
	} else {
		setStatusMode('progress');
		engine.startGame({
			'onProgress': function (current, total) {
				if (current > 0 && total > 0) {
					statusProgress.value = current;
					statusProgress.max = total;
				} else {
					statusProgress.removeAttribute('value');
					statusProgress.removeAttribute('max');
				}
			},
		}).then(() => {
			setStatusMode('hidden');
		}, displayFailureNotice);
	}
}());
		</script>
