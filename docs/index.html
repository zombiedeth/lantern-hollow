		<style>
html, body, #canvas {
	margin: 0;
	padding: 0;
	border: 0;
}

html, body {
	width: 100%;
	height: 100%;
	min-width: 100vw;
	min-height: 100vh;
	min-height: 100dvh;
}

body {
	color: white;
	background-color: black;
	overflow: hidden;
	touch-action: none;
	position: fixed;
	inset: 0;
}

#canvas {
	display: block;
	position: fixed;
	inset: 0;
	width: 100vw !important;
	height: 100vh !important;
	height: 100dvh !important;
	max-width: none !important;
	max-height: none !important;
	object-fit: cover;
	touch-action: none;
}

#canvas:focus {
	outline: none;
}

#status, #status-splash, #status-progress {
	position: absolute;
	left: 0;
	right: 0;
}

#status, #status-splash {
	top: 0;
	bottom: 0;
}

#status {
	background-color: #242424;
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	visibility: hidden;
}

#status-splash {
	max-height: 100%;
	max-width: 100%;
	margin: auto;
}

#status-splash.show-image--false {
	display: none;
}

#status-splash.fullsize--true {
	height: 100%;
	width: 100%;
	object-fit: contain;
}

#status-splash.use-filter--false {
	image-rendering: pixelated;
}

#status-progress, #status-notice {
	display: none;
}

#status-progress {
	bottom: 10%;
	width: 50%;
	margin: 0 auto;
}

#status-notice {
	background-color: #5b3943;
	border-radius: 0.5rem;
	border: 1px solid #9b3943;
	color: #e0e0e0;
	font-family: 'Noto Sans', 'Droid Sans', Arial, sans-serif;
	line-height: 1.3;
	margin: 0 2rem;
	overflow: hidden;
	padding: 1rem;
	text-align: center;
	z-index: 1;
}

<link rel="apple-touch-icon" href="index.apple-touch-icon.png"/>
<link rel="preload" href="music_07_glowing_garden.mp3" as="audio" type="audio/mpeg">

	<body>
		<canvas id="canvas">
			Your browser does not support the canvas tag.
		</canvas>

		<noscript>
			Your browser does not support JavaScript.
		</noscript>

		<div id="status">
			<img id="status-splash" class="show-image--true fullsize--true use-filter--true" src="index.png" alt="">
			<progress id="status-progress"></progress>
			<div id="status-notice"></div>
		</div>

		<script src="index.js"></script>
		<script>
const GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"emscriptenPoolSize":8,"ensureCrossOriginIsolationHeaders":true,"executable":"index","experimentalVK":false,"fileSizes":{"index.pck":20739736,"index.wasm":39509339},"focusCanvas":true,"gdextensionLibs":[],"godotPoolSize":4};
const GODOT_THREADS_ENABLED = false;
const engine = new Engine(GODOT_CONFIG);

// Mobile fullscreen guard: exported Godot shells can leave the canvas at
// its internal size on phones. Force the DOM canvas to match the live visual
// viewport before and during the game boot.
(function forceMobileFullscreenCanvas() {
	function resizeCanvas() {
		const canvas = document.getElementById('canvas');
		if (!canvas) return;
		const vv = window.visualViewport;
		const w = Math.ceil(vv ? vv.width : window.innerWidth);
		const h = Math.ceil(vv ? vv.height : window.innerHeight);
		document.documentElement.style.width = w + 'px';
		document.documentElement.style.height = h + 'px';
		document.body.style.width = w + 'px';
		document.body.style.height = h + 'px';
		canvas.style.width = w + 'px';
		canvas.style.height = h + 'px';
	}
	window.addEventListener('resize', resizeCanvas, { passive: true });
	window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 250), { passive: true });
	if (window.visualViewport) window.visualViewport.addEventListener('resize', resizeCanvas, { passive: true });
	resizeCanvas();
})();

// iPhone Safari fallback: Godot WebAudio can report "playing" while staying
// silent on some iPhones. Use native HTML audio for the base lofi track on web.
// The phone debug build proved that a direct first-touch audio prime unlocks it,
// so this silently runs the same hardware-prime path on the first normal game tap.
(function setupLanternNativeAudio() {
	const MUSIC_SRC = 'music_07_glowing_garden.mp3';
	const audio = new Audio(MUSIC_SRC);
	audio.id = 'lantern-native-music';
	audio.loop = true;
	audio.preload = 'auto';
	audio.volume = 0.88;
	audio.muted = false;
	audio.setAttribute('playsinline', '');
	audio.setAttribute('webkit-playsinline', '');

	let started = false;
	let attemptInFlight = false;
	let primeCtx = null;

	function primeAudioHardware() {
		const AudioContextClass = window.AudioContext || window.webkitAudioContext;
		if (!AudioContextClass) return Promise.resolve();
		try {
			primeCtx = primeCtx || new AudioContextClass();
			const resumePromise = primeCtx.state === 'running' ? Promise.resolve() : primeCtx.resume();
			return resumePromise.then(() => {
				// Near-silent oscillator: same Safari audio-hardware path as the
				// successful phone debug primer, but without an audible chirp.
				const osc = primeCtx.createOscillator();
				const gain = primeCtx.createGain();
				osc.type = 'square';
				osc.frequency.value = 880;
				gain.gain.setValueAtTime(0.0001, primeCtx.currentTime);
				gain.gain.exponentialRampToValueAtTime(0.0001, primeCtx.currentTime + 0.12);
				osc.connect(gain).connect(primeCtx.destination);
				osc.start();
				osc.stop(primeCtx.currentTime + 0.14);
			});
		} catch (err) {
			console.warn('LANTERN_AUDIO_PRIME_SKIPPED', err && (err.name || err.message || err));
			return Promise.resolve();
		}
	}

	async function unlock(reason) {
		if (started || attemptInFlight) return;
		attemptInFlight = true;
		try {
			audio.muted = false;
			audio.volume = 0.88;
			if (audio.readyState === 0) audio.load();
			// Kick both unlock paths synchronously inside the same trusted gesture.
			// Do not await the primer before play(), or iOS may spend the activation.
			const primePromise = primeAudioHardware();
			const playPromise = audio.play();
			await primePromise.catch(() => {});
			await playPromise;
			started = true;
			console.log('LANTERN_NATIVE_AUDIO_STARTED', reason, audio.readyState, audio.currentSrc || MUSIC_SRC);
		} catch (err) {
			attemptInFlight = false;
			console.warn('LANTERN_NATIVE_AUDIO_BLOCKED', reason, err && (err.name || err.message || err));
		}
	}

	function installFirstTouchUnlock(target) {
		if (!target) return;
		['touchstart', 'touchend', 'pointerdown', 'mousedown', 'click'].forEach((eventName) => {
			target.addEventListener(eventName, () => unlock(eventName), { capture: true, passive: true });
		});
	}

	window.LanternNativeAudio = { unlock, audio };
	installFirstTouchUnlock(window);
	document.addEventListener('DOMContentLoaded', () => {
		installFirstTouchUnlock(document.body);
		installFirstTouchUnlock(document.getElementById('canvas'));
	}, { once: true });
	document.addEventListener('visibilitychange', () => {
		if (!document.hidden && started && audio.paused) audio.play().catch(() => {});
	});
})();

(function () {
	const statusOverlay = document.getElementById('status');
	const statusProgress = document.getElementById('status-progress');
	const statusNotice = document.getElementById('status-notice');

	let initializing = true;
	let statusMode = '';

	function setStatusMode(mode) {
		if (statusMode === mode || !initializing) {
			return;
		}
		if (mode === 'hidden') {
			statusOverlay.remove();
			initializing = false;
			return;
		}
		statusOverlay.style.visibility = 'visible';
		statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
		statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
		statusMode = mode;
	}

	function setStatusNotice(text) {
		while (statusNotice.lastChild) {
			statusNotice.removeChild(statusNotice.lastChild);
		}
		const lines = text.split('\n');
		lines.forEach((line) => {
			statusNotice.appendChild(document.createTextNode(line));
			statusNotice.appendChild(document.createElement('br'));
		});
	}

	function displayFailureNotice(err) {
		console.error(err);
		if (err instanceof Error) {
			setStatusNotice(err.message);
		} else if (typeof err === 'string') {
			setStatusNotice(err);
		} else {
			setStatusNotice('An unknown error occurred.');
		}
		setStatusMode('notice');
		initializing = false;
	}

	const missing = Engine.getMissingFeatures({
		threads: GODOT_THREADS_ENABLED,
	});

	if (missing.length !== 0) {
		if (GODOT_CONFIG['serviceWorker'] && GODOT_CONFIG['ensureCrossOriginIsolationHeaders'] && 'serviceWorker' in navigator) {
			let serviceWorkerRegistrationPromise;
			try {
				serviceWorkerRegistrationPromise = navigator.serviceWorker.getRegistration();
			} catch (err) {
				serviceWorkerRegistrationPromise = Promise.reject(new Error('Service worker registration failed.'));
			}
			// There's a chance that installing the service worker would fix the issue
			Promise.race([
				serviceWorkerRegistrationPromise.then((registration) => {
					if (registration != null) {
						return Promise.reject(new Error('Service worker already exists.'));
					}
					return registration;
				}).then(() => engine.installServiceWorker()),
				// For some reason, `getRegistration()` can stall
				new Promise((resolve) => {
					setTimeout(() => resolve(), 2000);
				}),
			]).then(() => {
				// Reload if there was no error.
				window.location.reload();
			}).catch((err) => {
				console.error('Error while registering service worker:', err);
			});
		} else {
			// Display the message as usual
			const missingMsg = 'Error\nThe following features required to run Godot projects on the Web are missing:\n';
			displayFailureNotice(missingMsg + missing.join('\n'));
		}
	} else {
		setStatusMode('progress');
		engine.startGame({
			'onProgress': function (current, total) {
				if (current > 0 && total > 0) {
					statusProgress.value = current;
					statusProgress.max = total;
				} else {
					statusProgress.removeAttribute('value');
					statusProgress.removeAttribute('max');
				}
			},
		}).then(() => {
			setStatusMode('hidden');
		}, displayFailureNotice);
	}
}());
		</script>
	</body>
